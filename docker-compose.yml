services:
  gateway:
    image: nginx:1.27-alpine
    container_name: stock_gateway
    depends_on:
      - backend
      - frontend
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - stock_platform

  backend:
    build:
      context: ./backend
    container_name: stock_backend
    environment:
      APP_NAME: ${APP_NAME:-Stock Market Data Platform}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-stock_dw}
      POSTGRES_USER: ${POSTGRES_USER:-stock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_password}
      SCYLLA_HOSTS: scylla
      SCYLLA_KEYSPACE: ${SCYLLA_KEYSPACE:-stock_online_store}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
      - scylla
    networks:
      - stock_platform

  frontend:
    build:
      context: ./frontend
    container_name: stock_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - stock_platform

  postgres:
    image: postgres:16-alpine
    container_name: stock_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock_dw}
      POSTGRES_USER: ${POSTGRES_USER:-stock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stock_user} -d ${POSTGRES_DB:-stock_dw}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - stock_platform

  scylla:
    image: scylladb/scylla:6.2
    container_name: stock_scylla
    command: ["--smp", "1", "--memory", "1G", "--overprovisioned", "1", "--api-address", "0.0.0.0"]
    ports:
      - "${SCYLLA_CQL_PORT:-9042}:9042"
      - "${SCYLLA_API_PORT:-10000}:10000"
    volumes:
      - scylla_data:/var/lib/scylla
      - ./scylla/init:/schema:ro
    networks:
      - stock_platform

volumes:
  postgres_data:
  scylla_data:

networks:
  stock_platform:
    driver: bridge
